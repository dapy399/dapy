name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: react-admin
  CONTAINER_NAME: react-admin
  REMOTE_DIR: /opt/react-admin
  PORT: 80

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            .

      - name: Export and compress image
        run: |
          docker save $IMAGE_NAME:latest -o $IMAGE_NAME.tar
          gzip -f $IMAGE_NAME.tar
          ls -lh $IMAGE_NAME.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat << 'KEYEOF' > ~/.ssh/id_ecs
          ${{ secrets.ECS_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/id_ecs
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload image to ECS
        run: |
          scp -i ~/.ssh/id_ecs -o StrictHostKeyChecking=no \
            $IMAGE_NAME.tar.gz \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:$REMOTE_DIR/

      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/id_ecs -o StrictHostKeyChecking=no \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} << 'EOF'
            set -e
            cd $REMOTE_DIR
            docker load -i $IMAGE_NAME.tar.gz
            rm -f $IMAGE_NAME.tar.gz
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true
            docker run -d \
              --name $CONTAINER_NAME \
              --restart=always \
              -p $PORT:80 \
              $IMAGE_NAME:latest
            echo "等待健康检查..."
            for i in $(seq 1 12); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_NAME 2>/dev/null || echo starting)
              [ "$HEALTH" = "healthy" ] && echo "部署成功！" && exit 0
              echo "  $i/12: $HEALTH"
              sleep 5
            done
            echo "健康检查超时，查看日志："
            docker logs --tail 20 $CONTAINER_NAME
          EOF

      - name: Cleanup
        if: always()
        run: rm -f $IMAGE_NAME.tar.gz ~/.ssh/id_ecs

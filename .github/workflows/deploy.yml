name: Build and Deploy

on:
  # 当 push 到 main 分支时触发
  push:
    branches: [main]
  # 也支持手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只允许部署并发，防止重复部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # =============================================
  # 任务 1：构建（Build）
  # =============================================
  build:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤 2：设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 步骤 3：安装依赖
      - name: Install dependencies
        run: npm ci

      # 步骤 4：TypeScript 类型检查
      - name: Type check
        run: npm run type-check

      # 步骤 5：ESLint 代码检查
      - name: Lint
        run: npm run lint || true

      # 步骤 6：构建生产包
      - name: Build
        run: npm run build
        env:
          # 如果有环境变量，在这里注入
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # 步骤 7：上传构建产物（供部署任务使用）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # =============================================
  # 任务 2：部署（Deploy）
  # =============================================
  deploy:
    # 必须等待 build 任务完成
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

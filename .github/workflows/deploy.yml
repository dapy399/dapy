# ============================================================
# React Admin — GitHub Actions 部署到阿里云 ECS
# 免 ACR，免第三方 action，纯 scp + ssh
# ============================================================

name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ==================== 1. 检出代码 ====================
      - name: Checkout code
        uses: actions/checkout@v4

      # ==================== 2. 构建 Docker 镜像 ====================
      - name: Build Docker image
        run: |
          docker build \
            -t react-admin:latest \
            -t react-admin:${{ github.sha }} \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            .

      # ==================== 3. 导出镜像并压缩 ====================
      - name: Export and compress image
        run: |
          docker save react-admin:latest -o react-admin.tar
          gzip -f react-admin.tar
          ls -lh react-admin.tar.gz

      # ==================== 4. 配置 SSH 密钥 ====================
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts

      # ==================== 5. SCP 上传镜像到 ECS ====================
      - name: Upload image to ECS
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            react-admin.tar.gz \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/react-admin/

      # ==================== 6. SSH 远程部署 ====================
      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} << 'EOF'
            set -e
            cd /opt/react-admin

            echo ">>> 加载新镜像..."
            docker load -i react-admin.tar.gz
            rm -f react-admin.tar.gz

            echo ">>> 停止旧容器..."
            docker stop react-admin 2>/dev/null || true
            docker rm react-admin 2>/dev/null || true

            echo ">>> 启动新容器..."
            docker run -d \
              --name react-admin \
              --restart=always \
              -p 80:80 \
              react-admin:latest

            echo ">>> 容器状态："
            docker ps --filter name=react-admin \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ">>> 等待健康检查..."
            for i in $(seq 1 12); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' react-admin 2>/dev/null || echo starting)
              if [ "$HEALTH" = "healthy" ]; then
                echo ">>> 部署成功！healthy"
                exit 0
              fi
              echo "  $i/12: $HEALTH"
              sleep 5
            done
            echo ">>> 警告：健康检查超时"
            docker logs --tail 20 react-admin
          EOF

      # ==================== 7. 清理 ====================
      - name: Cleanup
        if: always()
        run: |
          rm -f react-admin.tar.gz ~/.ssh/id_ed25519

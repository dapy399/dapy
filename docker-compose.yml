# ============================================================
# React Admin — docker-compose.yml
# 一键启动：docker compose up -d
# ============================================================

services:
  # 前台应用
  react-admin:
    build:
      context: .
      dockerfile: Dockerfile
      # 构建时注入的环境变量
      args:
        VITE_API_BASE_URL: https://api.example.com
    ports:
      - "3000:80"
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# React Admin — Nginx 配置
# 路径：C:\Users\MACHENIKE\Desktop\react-admin\nginx.conf

# 运行用户
user  nginx;
# 工作进程数（auto = CPU 核心数）
worker_processes  auto;

# 错误日志
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # 每个工作进程的最大连接数
    worker_connections  1024;
}

http {
    # 引入 MIME 类型
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（便于分析访问和排查问题）
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 高性能配置
    sendfile           on;
    tcp_nopush         on;   # 减少网络报文段的数量
    tcp_nodelay        on;   # 禁用 Nagle 算法，尽快发送数据
    keepalive_timeout  65;  # 长连接超时（秒）
    gzip                on;  # 开启 Gzip 压缩

    # Gzip 压缩配置（大幅减少传输体积）
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;              # 压缩级别 1-9，越大越压缩得狠（默认 6）
    gzip_buffers 16 8k;
    gzip_min_length 1024;           # 只压缩大于 1KB 的文件
    gzip_types text/plain text/css
                     application/json
                     application/javascript
                     application/xml
                     image/svg+xml;

    # 上传文件大小限制（如果项目有文件上传需求）
    client_max_body_size 10m;

    # =============================================
    # 服务器块（Server Block）
    # =============================================
    server {
        listen       80;
        server_name  localhost;

        # 字符编码
        charset utf-8;

        # 根目录（构建产物 dist 目录的绝对路径）
        root   /usr/share/nginx/html;
        index  index.html;

        # 访问日志
        access_log /var/log/nginx/app.access.log main;

        # -------------------------------------------
        # SPA 单页应用路由配置（关键！）
        # -------------------------------------------
        # React Router 使用 BrowserHistory，刷新页面时
        # nginx 需要 fallback 到 index.html，而不是 404

        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源（JS/CSS/图片）：强缓存 + fingerprint
        location /assets/ {
            # 目录映射到 dist/assets/
            alias /usr/share/nginx/html/assets/;

            # 缓存控制：1 年（文件有 hash，不会过期）
            expires 1y;
            add_header Cache-Control "public, immutable";

            # 开启 Gzip 后这些文件已经被压缩，关闭代理缓存
            add_header Last-Modified "";
            etag off;
        }

        # 高德地图 favicon.ico 等根路径文件
        location = /favicon.svg {
            expires 30d;
            add_header Cache-Control "public";
        }

        # 健康检查接口（用于 K8s / 负载均衡探活）
        location = /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # -------------------------------------------
        # API 代理（如果有后端接口）
        # -------------------------------------------
        # location /api/ {
        #     proxy_pass http://backend:8080/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_connect_timeout 5s;
        #     proxy_read_timeout 30s;
        # }

        # -------------------------------------------
        # 安全响应头
        # -------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 禁止搜索引擎收录（可选，上线后改为 allow all）
        # if ($request_uri = /robots.txt) {
        #     return 200 "User-agent: *\nDisallow: /\n";
        # }
    }
}
